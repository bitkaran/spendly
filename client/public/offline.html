<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Spendly - Connection Offline</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #151c2c;
      --border-color: #222f47;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
    }
    
    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --border-color: #f1f5f9;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
      }
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      transition: background-color 0.3s, color 0.3s;
    }
    
    .container {
      max-width: 280px;
      padding: 28px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }
    
    .logo-container {
      margin-bottom: 20px;
      display: inline-block;
    }
    
    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    
    p {
      font-size: 11px;
      color: var(--text-secondary);
      margin: 0 0 20px 0;
      line-height: 1.6;
      font-weight: 500;
    }
    
    .btn {
      display: inline-block;
      background: #0f172a;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    
    @media (prefers-color-scheme: dark) {
      .btn {
        background: #ffffff;
        color: #0f172a;
      }
    }

    .btn:active {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="56" height="56">
        <defs>
          <linearGradient id="spendly-logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5" />
            <stop offset="50%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#10b981" />
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="46" fill="url(#spendly-logo-gradient)" opacity="0.15" />
        <path
          d="M30 62 C 30 72, 70 72, 70 58 C 70 48, 45 46, 45 38 C 45 32, 65 32, 65 42"
          stroke="url(#spendly-logo-gradient)"
          stroke-width="11"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        />
        <path
          d="M35 58 C 35 68, 55 68, 55 62"
          stroke="#10b981"
          stroke-width="11"
          stroke-linecap="round"
          fill="none"
          opacity="0.9"
        />
        <circle cx="70" cy="34" r="7" fill="#10b981" />
        <path
          d="M62 34 L 70 34 L 70 42"
          stroke="#10b981"
          stroke-width="3.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        />
      </svg>
    </div>
    <h1>Connection offline</h1>
    <p>Spendly needs an internet connection to sync your daily transaction logs. Please check your data or Wi-Fi and retry.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">Retry Connection</a>
  </div>
</body>
</html>

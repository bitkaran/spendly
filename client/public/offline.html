<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Spendly - Connection Offline</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #151c2c;
      --border-color: #222f47;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
    }
    
    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --border-color: #f1f5f9;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
      }
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      transition: background-color 0.3s, color 0.3s;
    }
    
    .container {
      max-width: 280px;
      padding: 28px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }
    
    .logo-container {
      margin-bottom: 20px;
      display: inline-block;
    }
    
    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    
    p {
      font-size: 11px;
      color: var(--text-secondary);
      margin: 0 0 20px 0;
      line-height: 1.6;
      font-weight: 500;
    }
    
    .btn {
      display: inline-block;
      background: #0f172a;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    
    @media (prefers-color-scheme: dark) {
      .btn {
        background: #ffffff;
        color: #0f172a;
      }
    }

    .btn:active {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" width="120" height="120" style="margin-bottom: 8px;">
        <defs>
          <linearGradient id="off-grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5" />
            <stop offset="100%" stop-color="#6366f1" />
          </linearGradient>
          <linearGradient id="off-grad-accent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ef4444" />
            <stop offset="100%" stop-color="#b91c1c" />
          </linearGradient>
        </defs>
        
        <circle cx="100" cy="100" r="70" fill="#f1f5f9" opacity="0.1" />
        <circle cx="100" cy="100" r="50" stroke="#f1f5f9" stroke-width="2" stroke-dasharray="4 4" opacity="0.2" />

        <path d="M70 110 A20 20 0 0 1 90 75 A25 25 0 0 1 135 70 A22 22 0 0 1 150 110 Z" fill="url(#off-grad-primary)" opacity="0.9" />

        <path d="M125 60 L75 140" stroke="url(#off-grad-accent)" stroke-width="6" stroke-linecap="round" />
      </svg>
    </div>
    <h1>Connection offline</h1>
    <p>Spendly needs an internet connection to sync your daily transaction logs. Please check your data or Wi-Fi and retry.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">Retry Connection</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Spendly - You are Offline</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0b0f19;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 320px;
      padding: 24px;
      background-color: #151c2c;
      border: 1px solid #222f47;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 8px 0;
      font-weight: 700;
    }
    p {
      font-size: 13px;
      color: #94a3b8;
      margin: 0 0 24px 0;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:active {
      opacity: 0.9;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔌</div>
    <h1>You are offline</h1>
    <p>Spendly requires an active internet connection to synchronize and fetch your transaction logs. Please check your network and try again.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">Retry Connection</a>
  </div>
</body>
</html>

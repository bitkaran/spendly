<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    
    <!-- iOS / PWA stand-alone capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Spendly" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Mobile safe area and layout viewport control -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <!-- Meta title & descriptions -->
    <title>Spendly - Advanced Expense Tracker</title>
    <meta name="title" content="Spendly - Advanced Expense Tracker" />
    <meta name="description" content="Spendly helps you track daily travel, lunch, dinner and custom expenses on a premium mobile-first interface." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thespendly.vercel.app/" />
    <meta property="og:title" content="Spendly - Advanced Expense Tracker" />
    <meta property="og:description" content="Spendly helps you track daily travel, lunch, dinner and custom expenses on a premium mobile-first interface." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://thespendly.vercel.app/" />
    <meta property="twitter:title" content="Spendly - Advanced Expense Tracker" />
    <meta property="twitter:description" content="Spendly helps you track daily travel, lunch, dinner and custom expenses on a premium mobile-first interface." />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Theme color for mobile browser status bar -->
    <meta name="theme-color" content="#4f46e5" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
